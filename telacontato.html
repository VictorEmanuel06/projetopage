<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tela de Contato</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
    <link rel="stylesheet" href="./css/menuhome.css"/>
    <link rel="stylesheet" href="./css/footerhome.css"/>
    <link rel="stylesheet" href="./css/stylestelacontato.css"/>
</head>

<body>
    
    <header id="nav"></header>

    <main>
        <section id="contatos" class="contact-section">
            <div class="contact-wrapper">
                <br>
                <div class="contact-conentair">
                    <form id="fale-comigo" novalidate>
                        <h2>Vamos Conversar?</h2>
                        <p class="subtitle">
                            Se você busca agendar uma sessão, tirar dúvidas ou iniciar seu processo terapêutico, entre
                            em contato.
                            <br>
                            Garantimos total sigilo e acolhimento.
                        </p>
                        <input id="nome" type="text" name="nome" placeholder="Seu nome" />
                        <input id="email" type="email" name="email" placeholder="Seu e-mail" />
                        <input id="number" type="tel" name="telefone" placeholder="Seu telefone" />
                        <textarea id="mensagem" name="mensagem" placeholder="Mensagem"></textarea>
                        <p id="erro"></p>
                        <button type="submit">Enviar</button>

                        <div class="horario-atendimento">
                            <p>Horário de Atendimento:<br>Segunda, terça, Quinta e Sexta, das 10h às 21h.</p>
                        </div>
                        <div class="frame">
                         <iframe src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3654.733004189908!2d-46.667718799999996!3d-23.649731!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x94ce5a9c2e471a07%3A0x34d03b41ee47c258!2sR.%20Salvador%20Iacona%2C%2027%20-%20Vila%20Santa%20Catarina%2C%20S%C3%A3o%20Paulo%20-%20SP%2C%2004367-070!5e0!3m2!1spt-BR!2sbr!4v1769695078524!5m2!1spt-BR!2sbr%22" width="600" height="400" style="border:0;" allowfullscreen="" loading="lazy" referrerpolicy="no-referrer-when-downgrade"></iframe>
                         </div>
                    </form>
                </div>
            </div>
        </section>
    </main>

    
    <footer id="footer"></footer>

    <script src="./js/includehome.js"></script>
    <script src="./js/scripttelacontato.js"></script>
</body>
